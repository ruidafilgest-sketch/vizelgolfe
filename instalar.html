<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b1928">
<title>Vizelgolfe · Instalar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;500;600;700&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#0b1928;
  --navy2:#122035;
  --orange:#d4820a;
  --orange2:#e8960f;
  --blue:#1e5fa8;
  --text:#f0f4f8;
  --muted:rgba(240,244,248,0.45);
  --border:rgba(255,255,255,0.08);
}
html,body{
  min-height:100dvh;
  background:var(--navy);
  color:var(--text);
  font-family:"Barlow Condensed",sans-serif;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:radial-gradient(ellipse at 50% -10%, rgba(30,95,168,0.22) 0%, transparent 65%);
  pointer-events:none;
}

/* ── PAGE ── */
.page{
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100dvh;
  padding:2.5rem 1.25rem 3.5rem;
  position:relative;
  gap:0;
}

/* ── HEADER ── */
.header{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0.75rem;
  margin-bottom:2.25rem;
  opacity:0;
  animation:up 0.6s 0.05s forwards;
}
.logo{
  width:86px;height:86px;
  border-radius:50%;
  border:3px solid var(--orange);
  box-shadow:0 0 28px rgba(212,130,10,0.3), 0 0 0 6px rgba(212,130,10,0.08);
  object-fit:cover;
}
.title{
  font-family:"Bebas Neue",sans-serif;
  font-size:2rem;
  letter-spacing:6px;
  color:var(--orange2);
}
.subtitle{
  font-size:0.75rem;
  color:var(--muted);
  letter-spacing:0.12em;
  text-transform:uppercase;
}

/* ── INSTRUCTION ── */
.instruction{
  font-size:0.82rem;
  color:var(--muted);
  text-align:center;
  margin-bottom:1.25rem;
  max-width:280px;
  line-height:1.5;
  opacity:0;
  animation:up 0.5s 0.2s forwards;
}

/* ── APP CARDS ── */
.cards{
  display:flex;
  flex-direction:column;
  gap:0.75rem;
  width:100%;
  max-width:380px;
}

.card{
  background:var(--navy2);
  border:1px solid var(--border);
  border-radius:16px;
  padding:1.25rem 1.4rem;
  display:flex;
  align-items:center;
  gap:1.1rem;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:background 0.18s, border-color 0.18s, transform 0.12s;
  text-decoration:none;
  color:inherit;
  opacity:0;
  animation:up 0.5s forwards;
  position:relative;
  overflow:hidden;
}
.card::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, rgba(212,130,10,0.06) 0%, transparent 60%);
  pointer-events:none;
}
.card:nth-child(1){animation-delay:0.28s;}
.card:nth-child(2){animation-delay:0.36s;}
.card:nth-child(3){animation-delay:0.44s;}
.card:active{transform:scale(0.97); background:rgba(212,130,10,0.08);}

.card-icon{
  width:50px;height:50px;
  border-radius:13px;
  background:rgba(212,130,10,0.12);
  border:1px solid rgba(212,130,10,0.22);
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;
  flex-shrink:0;
}
.card-body{flex:1;min-width:0;}
.card-name{font-size:1rem;font-weight:600;margin-bottom:0.15rem;}
.card-desc{font-size:0.72rem;color:var(--muted);font-family:"Barlow",sans-serif;}
.card-arrow{color:var(--orange);font-size:1rem;opacity:0.7;flex-shrink:0;transition:transform 0.2s;}
.card:hover .card-arrow{transform:translateX(3px);}

/* ── MODAL ── */
.overlay{
  position:fixed;inset:0;
  background:rgba(11,25,40,0.88);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  z-index:100;
  display:flex;align-items:flex-end;
  padding:1rem;
  opacity:0;pointer-events:none;
  transition:opacity 0.25s;
}
.overlay.open{opacity:1;pointer-events:all;}

.sheet{
  width:100%;max-width:440px;
  margin:0 auto;
  background:#122035;
  border:1px solid rgba(212,130,10,0.18);
  border-radius:22px;
  padding:1.75rem 1.6rem 1.5rem;
  display:flex;flex-direction:column;gap:1.25rem;
  transform:translateY(40px);
  transition:transform 0.35s cubic-bezier(.34,1.3,.64,1);
}
.overlay.open .sheet{transform:translateY(0);}

.sheet-head{display:flex;align-items:center;gap:0.9rem;}
.sheet-icon{
  width:52px;height:52px;border-radius:14px;
  background:rgba(212,130,10,0.12);
  border:1px solid rgba(212,130,10,0.22);
  display:flex;align-items:center;justify-content:center;
  font-size:1.6rem;flex-shrink:0;
}
.sheet-name{font-size:1.05rem;font-weight:600;}
.sheet-url{font-size:0.7rem;color:var(--muted);margin-top:0.15rem;font-family:"Barlow",sans-serif;}

/* Browser warning */
.browser-warn{
  background:rgba(234,179,8,0.08);
  border:1px solid rgba(234,179,8,0.25);
  border-radius:10px;
  padding:0.8rem 1rem;
  font-size:0.82rem;
  line-height:1.5;
  color:rgba(240,244,248,0.8);
  display:none;
}
.browser-warn.show{display:block;}
.browser-warn strong{color:#fde047;}

/* Steps */
.steps{display:flex;flex-direction:column;gap:0.7rem;}
.step{display:flex;align-items:flex-start;gap:0.85rem;}
.sn{
  width:26px;height:26px;border-radius:50%;
  background:rgba(212,130,10,0.15);
  border:1px solid rgba(212,130,10,0.35);
  color:var(--orange2);
  font-size:0.72rem;font-weight:600;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;
}
.st{font-size:0.88rem;line-height:1.55;color:rgba(240,244,248,0.8);}
.st strong{color:var(--text);font-weight:600;}
.pill{
  display:inline-block;
  background:rgba(212,130,10,0.12);
  border:1px solid rgba(212,130,10,0.3);
  border-radius:5px;padding:0.05rem 0.42rem;
  font-family:"Barlow Condensed",sans-serif;
  font-size:0.78rem;color:var(--orange2);
  white-space:nowrap;
}

/* Install button */
.btn-install{
  width:100%;padding:0.95rem;
  border-radius:12px;border:none;
  background:linear-gradient(135deg,var(--orange),var(--orange2));
  color:#0b1928;
  font-family:"Barlow Condensed",sans-serif;
  font-size:1rem;font-weight:700;
  letter-spacing:0.06em;text-transform:uppercase;
  cursor:pointer;
  display:none;align-items:center;justify-content:center;gap:0.5rem;
  -webkit-tap-highlight-color:transparent;
  box-shadow:0 4px 20px rgba(212,130,10,0.35);
  transition:opacity 0.2s,transform 0.12s;
}
.btn-install.show{display:flex;}
.btn-install:active{opacity:0.85;transform:scale(0.98);}

/* Close */
.btn-close{
  width:100%;padding:0.7rem;
  border-radius:10px;border:1px solid var(--border);
  background:transparent;color:var(--muted);
  font-family:"Barlow Condensed",sans-serif;
  font-size:0.78rem;letter-spacing:0.08em;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:all 0.15s;
}
.btn-close:active{color:var(--text);border-color:rgba(212,130,10,0.3);}

/* Animations */
@keyframes up{
  from{opacity:0;transform:translateY(14px);}
  to{opacity:1;transform:translateY(0);}
}
</style>
</head>

      </div>
      <div class="card-arrow">→</div>
    </div>
  </div>

</div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="fecharSeForaModal(event)">
  <div class="sheet">
    <div class="sheet-head">
      <div class="sheet-icon" id="s-icon"></div>
      <div>
        <div class="sheet-name" id="s-name"></div>
        <div class="sheet-url" id="s-url"></div>
      </div>
    </div>
    <div class="browser-warn" id="b-warn"></div>
    <div class="steps" id="steps"></div>
    <button class="btn-install" id="btn-install" onclick="doInstall()">⬇ Instalar agora</button>
    <button class="btn-close" onclick="fecharModal()">fechar</button>
  </div>
</div>

<script>
var APPS = {
  consola:    {icon:'🖥️', name:'Consola',       url:'vizelgolfe.net/consola.html',       full:'https://vizelgolfe.net/consola.html'},
  resultados: {icon:'📺', name:'Resultados',     url:'vizelgolfe.net/',                   full:'https://vizelgolfe.net/'},
  portal:     {icon:'👤', name:'Portal do Sócio',url:'vizelgolfe.net/portal-socios.html', full:'https://vizelgolfe.net/portal-socios.html'}
};

var ua = navigator.userAgent;
var isIOS     = /iphone|ipad|ipod/i.test(ua);
var isAndroid = /android/i.test(ua);
var isSafari  = /safari/i.test(ua) && !/chrome|crios|fxios|fban|fbav/i.test(ua);
var isChrome  = /chrome|crios/i.test(ua) && !/edge/i.test(ua);
var isSamsung = /samsungbrowser/i.test(ua);
var deferredPrompt = null;

window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  deferredPrompt = e;
});

function getBrowser() {
  if (isSamsung) return 'Samsung Internet';
  if (/firefox|fxios/i.test(ua)) return 'Firefox';
  if (/edg/i.test(ua)) return 'Edge';
  if (isChrome) return 'Chrome';
  if (isSafari) return 'Safari';
  return 'este browser';
}

function step(n, t, s) {
  return '<div class="step"><div class="sn">'+n+'</div><div class="st">'+t+
    (s ? '<br><span style="font-size:0.7rem;opacity:0.42;">'+s+'</span>' : '')+
    '</div></div>';
}

function abrirModal(id) {
  var app = APPS[id];
  document.getElementById('s-icon').textContent = app.icon;
  document.getElementById('s-name').textContent = app.name;
  document.getElementById('s-url').textContent  = app.url;

  var warn    = document.getElementById('b-warn');
  var stepsEl = document.getElementById('steps');
  var btnInst = document.getElementById('btn-install');

  warn.classList.remove('show');
  btnInst.classList.remove('show');
  stepsEl.innerHTML = '';

  if (isIOS) {
    if (isSafari) {
      stepsEl.innerHTML =
        step(1, 'Toca no ícone de partilha <span class="pill">&#9633; &#8593;</span>', 'Barra em baixo no Safari') +
        step(2, 'Toca em <span class="pill">Adicionar ao Início</span>', 'Desliza a lista para encontrar') +
        step(3, 'Toca em <strong>Adicionar</strong> no canto superior direito', '');
    } else {
      warn.innerHTML = 'No iPhone só funciona no <strong>Safari</strong>. Estás a usar o '+getBrowser()+'. Abre este link no Safari.';
      warn.classList.add('show');
      stepsEl.innerHTML =
        step(1, 'Abre o <strong>Safari</strong>', 'O ícone azul com a bússola') +
        step(2, 'Copia e abre: <span class="pill">'+app.url+'</span>', '') +
        step(3, '<span class="pill">&#9633; &#8593;</span> → <span class="pill">Adicionar ao Início</span>', '');
    }
  } else if (isAndroid) {
    if (deferredPrompt) {
      btnInst.classList.add('show');
      stepsEl.innerHTML = step(1, 'Toca no botão <strong>Instalar agora</strong> aqui em baixo', 'Um toque e fica no ecrã');
    } else if (isChrome || isSamsung) {
      stepsEl.innerHTML =
        step(1, 'Toca nos <strong>três pontinhos &#8942;</strong>', 'Canto superior direito') +
        step(2, 'Toca em <span class="pill">Adicionar ao ecrã inicial</span>', '') +
        step(3, 'Toca em <strong>Adicionar</strong> para confirmar', '');
    } else {
      warn.innerHTML = 'Para instalar usa o <strong>Chrome</strong>. Estás a usar o '+getBrowser()+'.';
      warn.classList.add('show');
      stepsEl.innerHTML =
        step(1, 'Abre o <strong>Chrome</strong>', '') +
        step(2, 'Copia e abre: <span class="pill">'+app.url+'</span>', '') +
        step(3, '<span class="pill">&#8942;</span> → <span class="pill">Adicionar ao ecrã inicial</span>', '');
    }
  } else {
    // Desktop
    stepsEl.innerHTML = step(1, 'Abre este link no telemóvel', app.url);
  }

  document.getElementById('overlay').classList.add('open');
}

function doInstall() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(function() {
    deferredPrompt = null;
    fecharModal();
  });
}

function fecharModal() {
  document.getElementById('overlay').classList.remove('open');
}
function fecharSeForaModal(e) {
  if (e.target === document.getElementById('overlay')) fecharModal();
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vizelgolfe — TV Nacional</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#050e1c;
  --navy2:#0a1828;
  --navy3:#0f2038;
  --gold:#c8943a;
  --gold2:#e8b84e;
  --gold3:#f5d070;
  --red:#e03030;
  --green:#22c55e;
  --blue:#3b82f6;
  --dim:#4a6080;
  --dim2:#7a90a8;
  --text:#e8f0f8;
  --text2:#a8bdd0;
  --sep:rgba(200,148,58,.15);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:var(--navy);color:var(--text);font-family:"Barlow Condensed",sans-serif;overflow:hidden;user-select:none;}

/* ═══════════════════════════════════
   TOPBAR
═══════════════════════════════════ */
#topbar{
  height:64px;flex-shrink:0;
  background:var(--navy2);
  border-bottom:3px solid var(--gold);
  display:flex;align-items:center;padding:0 36px;gap:14px;
  position:relative;z-index:10;
}
#top-logo{width:40px;height:40px;border-radius:50%;border:2px solid var(--gold);flex-shrink:0;object-fit:contain;}
#top-title{display:flex;flex-direction:column;margin-right:auto;}
#top-title .t1{font-family:"Bebas Neue",sans-serif;font-size:1.35rem;letter-spacing:5px;color:var(--gold2);line-height:1;}
#top-title .t2{font-family:"Barlow",sans-serif;font-size:0.58rem;letter-spacing:2px;color:rgba(255,255,255,.25);text-transform:uppercase;}
#prova-nome{font-family:"Barlow Condensed",sans-serif;font-size:0.82rem;letter-spacing:2px;color:rgba(255,255,255,.45);margin-right:28px;max-width:400px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;}
#live{display:flex;align-items:center;gap:7px;font-family:"Barlow",sans-serif;font-size:0.68rem;letter-spacing:2px;color:var(--green);text-transform:uppercase;}
#dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 1.5s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.25;transform:scale(.55)}}
#clock{font-family:"Bebas Neue",sans-serif;font-size:1.65rem;letter-spacing:3px;color:rgba(255,255,255,.6);margin-left:22px;}
#last-update{font-family:"Barlow",sans-serif;font-size:0.6rem;letter-spacing:1px;color:rgba(255,255,255,.25);margin-left:12px;}

/* ═══════════════════════════════════
   CATBAR (tabs de categoria)
═══════════════════════════════════ */
#catbar{
  height:38px;flex-shrink:0;
  background:rgba(10,24,40,.95);
  border-bottom:1px solid rgba(200,148,50,.2);
  display:flex;align-items:center;padding:0 36px;gap:6px;
}
#catbar-label{font-family:"Barlow Condensed",sans-serif;font-size:0.65rem;letter-spacing:3px;color:var(--dim2);text-transform:uppercase;margin-right:6px;}
.cbtn{font-family:"Barlow Condensed",sans-serif;font-size:0.72rem;letter-spacing:2px;color:var(--dim2);cursor:pointer;padding:3px 12px;border:1px solid transparent;border-radius:3px;transition:all .15s;text-transform:uppercase;}
.cbtn:hover{color:var(--text);border-color:rgba(200,148,50,.3);}
.cbtn.on{color:var(--navy2);background:var(--gold);border-color:var(--gold);font-weight:700;}
#catbar-right{margin-left:auto;font-family:"Barlow",sans-serif;font-size:0.65rem;color:var(--dim);font-style:italic;}

/* ═══════════════════════════════════
   CARROSSEL
═══════════════════════════════════ */
#carousel-area{
  flex:1;overflow:hidden;position:relative;
  background:var(--navy);
}
.cat-slide{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  opacity:0;
  transform:translateX(40px);
  transition:opacity .55s ease, transform .55s ease;
  pointer-events:none;
  overflow:hidden;
}
.cat-slide.active{opacity:1;transform:translateX(0);pointer-events:auto;}
.cat-slide.exiting{opacity:0;transform:translateX(-40px);transition:opacity .4s ease, transform .4s ease;}

/* ── SLIDE HEADER ── */
.slide-hdr{
  flex-shrink:0;
  background:linear-gradient(90deg,var(--navy3) 0%,rgba(10,24,40,.6) 100%);
  border-left:5px solid var(--gold);
  padding:0 36px;
  height:70px;
  display:flex;align-items:center;gap:20px;
  position:relative;overflow:hidden;
}
.slide-hdr::after{content:'';position:absolute;right:-60px;top:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(200,148,50,.08) 0%,transparent 70%);pointer-events:none;}
.slide-cat-idx{font-family:"Bebas Neue",sans-serif;font-size:1rem;letter-spacing:4px;color:rgba(200,148,50,.4);flex-shrink:0;width:42px;text-align:right;}
.slide-cat-name{font-family:"Bebas Neue",sans-serif;font-size:2.4rem;letter-spacing:6px;color:#fff;line-height:1;flex:1;}
.slide-cat-count{font-family:"Barlow",sans-serif;font-size:0.7rem;letter-spacing:2px;color:var(--dim2);text-transform:uppercase;}
.slide-cat-fpm{font-family:"Barlow Condensed",sans-serif;font-size:0.68rem;letter-spacing:3px;color:var(--gold);text-transform:uppercase;padding:4px 12px;border:1px solid rgba(200,148,50,.35);border-radius:3px;background:rgba(200,148,50,.08);}

/* ── SLIDE BODY ── */
.slide-body{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;}
.slide-body::-webkit-scrollbar{display:none;}

/* ── BROADCAST TABLE ── */
.btbl{width:100%;border-collapse:collapse;}
.btbl thead th{
  font-family:"Barlow Condensed",sans-serif;
  font-size:0.6rem;letter-spacing:3px;
  color:var(--dim);text-transform:uppercase;
  padding:8px 36px;text-align:left;
  background:rgba(10,24,40,.8);
  border-bottom:1px solid rgba(200,148,50,.2);
  position:sticky;top:0;z-index:2;
}
.btbl thead th.c{text-align:center;}
.btbl thead th.r{text-align:right;}
.btbl tbody tr{border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s;}
.btbl tbody tr:nth-child(odd){background:rgba(255,255,255,.02);}
.btbl tbody tr:nth-child(even){background:transparent;}
.btbl tbody tr.p1{background:rgba(200,148,50,.12)!important;border-left:4px solid var(--gold);}
.btbl tbody tr.p2{background:rgba(160,180,210,.07)!important;border-left:4px solid #8aa0c0;}
.btbl tbody tr.p3{background:rgba(160,110,70,.07)!important;border-left:4px solid #c07848;}
.btbl tbody tr.vzg-row{border-right:3px solid rgba(200,148,50,.5);}

.td-pos{width:60px;font-family:"Bebas Neue",sans-serif;font-size:2rem;color:var(--dim);text-align:center;padding:14px 8px 14px 36px!important;}
.p1 .td-pos{color:var(--gold2);font-size:2.4rem;}
.p2 .td-pos{color:#8aa0c0;font-size:2.2rem;}
.p3 .td-pos{color:#c07848;font-size:2rem;}

.td-name-wrap{padding:14px 20px 14px 14px!important;}
.td-name{font-weight:700;font-size:1.55rem;color:var(--text);line-height:1.1;}
.p1 .td-name{color:#fff;}
.td-vzg::before{content:"🟡 ";}
.td-club{font-size:0.68rem;letter-spacing:1px;color:var(--dim2);text-transform:uppercase;margin-top:3px;font-family:"Barlow",sans-serif;}

.td-v{text-align:center;font-size:1.2rem;padding:14px 10px!important;font-weight:600;}
.td-tot{font-family:"Bebas Neue",sans-serif;font-size:2.2rem;letter-spacing:1px;text-align:right;padding:14px 36px 14px 10px!important;color:var(--text2);}
.p1 .td-tot{color:var(--gold2);font-size:2.4rem;}
.td-sit{text-align:center;font-size:0.9rem;padding:14px 20px!important;}

/* cores voltas */
.cv-blue{color:#60a5fa;font-weight:700;}
.cv-green{color:#4ade80;font-weight:700;}
.cv-red{color:#f87171;font-weight:700;}
.cv-gray{color:var(--dim2);font-weight:500;}
.cv-null{color:rgba(100,130,160,.35);font-weight:400;}

/* ── BOTTOMBAR ── */
#tv{position:fixed;inset:0;display:flex;flex-direction:column;}
#bottombar{
  height:34px;flex-shrink:0;
  background:var(--navy2);
  border-top:2px solid var(--gold);
  display:flex;align-items:center;padding:0 36px;
  position:relative;z-index:10;
}
#bottom-left{font-family:"Barlow Condensed",sans-serif;font-size:0.7rem;color:var(--gold);letter-spacing:2px;text-transform:uppercase;flex:1;}
#progress-bar-wrap{position:absolute;bottom:34px;left:0;right:0;height:3px;background:rgba(200,148,50,.1);pointer-events:none;}
#progress-bar{height:100%;background:var(--gold);width:0%;}
#cat-dots{display:flex;align-items:center;gap:6px;margin-right:24px;}
.cat-dot{width:6px;height:6px;border-radius:50%;background:var(--dim);transition:all .3s;cursor:pointer;}
.cat-dot.on{background:var(--gold);transform:scale(1.4);}
#bottom-right{font-family:"Barlow",sans-serif;font-size:0.62rem;color:rgba(255,255,255,.25);letter-spacing:1px;}

.nodata{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--dim);font-family:"Barlow",sans-serif;font-size:1rem;letter-spacing:2px;text-transform:uppercase;line-height:2.5;text-align:center;}
</style>
</head>

function voltaHTML(v,corFn){const n=voltaVal(v);if(n===null)return`<td class="td-v cv-null">—</td>`;if(n===126)return`<td class="td-v" style="color:#f87171;font-size:0.85rem;font-weight:600" title="Não jogou">126</td>`;return`<td class="td-v ${corFn(n)}">${n}</td>`;}

// ── RELÓGIO ──
function iniciarClock(){const tick=()=>{const n=new Date();document.getElementById('clock').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');};tick();setInterval(tick,1000);}

// ── BUILD SLIDES ──
function buildSlides(){
  if(!nacData)return;
  const cats=nacData.categorias||{};
  const catsRender=catAtiva?[catAtiva]:CAT_NAC.filter(c=>cats[c]&&cats[c].length>0);
  const newSlides=[];

  catsRender.forEach(cat=>{
    const atletas=cats[cat];
    if(!atletas||!atletas.length)return;
    const disciplina=nacVertentes[cat]||'mini';
    const isMini=['Homens','Senhoras','H','S'].some(g=>cat===g||cat.startsWith(g))||disciplina==='mini';
    const cV=isMini?corVoltaMini:corVoltaPeter;
    const maxV=Math.max(...atletas.map(a=>(a.voltas||[]).length),0);
    const voltaCols=Array.from({length:maxV},(_,i)=>`<th class="c" style="font-size:0.53rem">V${i+1}</th>`).join('');

    let rows='';
    atletas.forEach((a,i)=>{
      const vzg=isVzg(a.clube)&&!VZG_EXCECOES.includes(a.nome);
      const cls=(i===0?'p1':i===1?'p2':i===2?'p3':'')+(vzg?' vzg-row':'');
      const vCells=(a.voltas||[]).map(v=>voltaHTML(v,cV)).join('');
      const vaziosCells=Array(maxV-(a.voltas||[]).length).fill('<td class="td-v cv-null">—</td>').join('');
      const nV=(a.voltas||[]).filter(v=>voltaVal(v)!==null).length;
      const totCor=a.dnf?'':('td-tot '+corTotal(a.total,nV,isMini?'mini':'peter'));
      rows+=`<tr class="${cls}">
        <td class="td-pos">${a.rank||'—'}</td>
        <td class="td-name-wrap">
          <div class="td-name${vzg?' td-vzg':''}">${a.nome}</div>
          <div class="td-club">${a.clube}</div>
        </td>
        ${vCells}${vaziosCells}
        <td class="${totCor}">${a.dnf?'<span style="color:var(--red);font-size:0.75rem;font-weight:700">DNF</span>':a.total||'—'}</td>
        <td class="td-sit">${a.dnf?'':(a.completo?'✅':'⏳')}</td>
      </tr>`;
    });

    const html=`<table class="btbl">
      <thead><tr>
        <th class="c">Pos</th><th>Atleta</th>
        ${voltaCols}
        <th class="r">Total</th><th class="c">Sit.</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
    newSlides.push({catName:cat,html,count:atletas.length});
  });

  slides=newSlides;
  renderCarousel(true);
}

// ── RENDER CAROUSEL ──
function renderCarousel(reset){
  const area=document.getElementById('carousel-area');
  const dots=document.getElementById('cat-dots');
  if(!slides.length){
    area.innerHTML='<div class="nodata">Sem dados nacionais.<br><span style="font-size:0.75rem;color:var(--dim)">Usa o Atualizador Nacional</span></div>';
    dots.innerHTML='';stopCarousel();return;
  }
  const nd=document.getElementById('nodata-msg');if(nd)nd.style.display='none';

  if(reset){
    slideIdx=0;
    area.querySelectorAll('.cat-slide').forEach(el=>el.remove());
    slides.forEach((s,i)=>{
      const div=document.createElement('div');
      div.className='cat-slide'+(i===0?' active':'');
      div.id=`slide-${i}`;
      div.innerHTML=`
        <div class="slide-hdr">
          <div class="slide-cat-idx">${String(i+1).padStart(2,'0')}</div>
          <div class="slide-cat-name">${s.catName}</div>
          <div class="slide-cat-count">${s.count} atleta${s.count!==1?'s':''}</div>
          <div class="slide-cat-fpm">FPM · ${nacData.nome||''}</div>
        </div>
        <div class="slide-body">${s.html}</div>`;
      area.appendChild(div);
    });
    dots.innerHTML='';
    slides.forEach((_,i)=>{
      const d=document.createElement('div');d.className='cat-dot'+(i===0?' on':'');
      d.addEventListener('click',()=>goToSlide(i));dots.appendChild(d);
    });
    stopCarousel();startCarousel();
  }else{
    slides.forEach((s,i)=>{
      const div=document.getElementById(`slide-${i}`);
      if(div){
        const body=div.querySelector('.slide-body');if(body)body.innerHTML=s.html;
        const cnt=div.querySelector('.slide-cat-count');if(cnt)cnt.textContent=s.count+' atleta'+(s.count!==1?'s':'');
      }
    });
  }
}

function goToSlide(idx){
  if(idx===slideIdx||idx<0||idx>=slides.length)return;
  const prev=document.getElementById(`slide-${slideIdx}`);
  const next=document.getElementById(`slide-${idx}`);
  if(prev){prev.classList.remove('active');prev.classList.add('exiting');setTimeout(()=>prev.classList.remove('exiting'),450);}
  if(next){next.classList.add('active');const body=next.querySelector('.slide-body');if(body)body.scrollTop=0;}
  document.querySelectorAll('.cat-dot').forEach((d,i)=>d.classList.toggle('on',i===idx));
  slideIdx=idx;resetSlideScroll();resetProgress();
}
function nextSlide(){goToSlide((slideIdx+1)%slides.length);}

function startCarousel(){stopCarousel();resetSlideScroll();resetProgress();startSlideScrollLoop();}
function stopCarousel(){
  if(slideScrollRaf){cancelAnimationFrame(slideScrollRaf);slideScrollRaf=null;}
  if(progressRaf){cancelAnimationFrame(progressRaf);progressRaf=null;}
}
function resetSlideScroll(){slideScrollY=0;scrollPhase='pause_top';scrollPauseFrames=0;}
function startSlideScrollLoop(){
  if(slideScrollRaf)cancelAnimationFrame(slideScrollRaf);
  function loop(){
    const slide=document.getElementById(`slide-${slideIdx}`);
    const body=slide?slide.querySelector('.slide-body'):null;
    if(!body){slideScrollRaf=requestAnimationFrame(loop);return;}
    const maxScroll=body.scrollHeight-body.clientHeight;
    const needsScroll=maxScroll>10;
    if(scrollPhase==='pause_top'){
      scrollPauseFrames++;
      const pauseTarget=needsScroll?SCROLL_PAUSE_TOP:360;
      if(scrollPauseFrames>=pauseTarget){if(!needsScroll){nextSlide();}else{scrollPhase='scrolling';}}
    }else if(scrollPhase==='scrolling'){
      slideScrollY+=SCROLL_SPEED;
      if(slideScrollY>=maxScroll){slideScrollY=maxScroll;body.scrollTop=slideScrollY;scrollPhase='pause_bot';scrollPauseFrames=0;}
      else{body.scrollTop=slideScrollY;}
    }else if(scrollPhase==='pause_bot'){
      scrollPauseFrames++;if(scrollPauseFrames>=SCROLL_PAUSE_BOT){nextSlide();}
    }
    slideScrollRaf=requestAnimationFrame(loop);
  }
  slideScrollRaf=requestAnimationFrame(loop);
}
function resetProgress(){
  const bar=document.getElementById('progress-bar');if(!bar)return;
  bar.style.width='0%';if(progressRaf)cancelAnimationFrame(progressRaf);
  progressStart=null;
  function step(ts){if(!progressStart)progressStart=ts;const pct=Math.min(100,(ts-progressStart)/20000*100);bar.style.width=pct+'%';if(pct<100)progressRaf=requestAnimationFrame(step);}
  progressRaf=requestAnimationFrame(step);
}

// ── CATBAR BUTTONS ──
function buildCatBar(){
  if(!nacData)return;
  const cats=nacData.categorias||{};
  const catsPresentes=CAT_NAC.filter(c=>cats[c]&&cats[c].length>0);
  const bar=document.getElementById('catbar-btns');
  bar.innerHTML='';
  const btAll=document.createElement('div');btAll.className='cbtn on';btAll.textContent='Todas';
  btAll.addEventListener('click',()=>{catAtiva=null;updCatBar(bar,null);buildSlides();});
  bar.appendChild(btAll);
  catsPresentes.forEach(c=>{
    const b=document.createElement('div');b.className='cbtn';
    b.textContent=c.replace(' Masculinos',' M').replace(' Femininos',' F');
    b.addEventListener('click',()=>{catAtiva=c;updCatBar(bar,c);buildSlides();});
    bar.appendChild(b);
  });
  document.getElementById('catbar-right').textContent=`${catsPresentes.length} categorias`;
}
function updCatBar(bar,activo){
  bar.querySelectorAll('.cbtn').forEach((b,i)=>{
    if(i===0)b.classList.toggle('on',activo===null);
    else b.classList.toggle('on',b.textContent===activo?.replace(' Masculinos',' M').replace(' Femininos',' F'));
  });
}

// ── FIREBASE ──
iniciarClock();
onSnapshot(doc(db,'vizelgolfe','nacional'),(snap)=>{
  if(!snap.exists())return;
  const docData=snap.data();
  const data=docData.bangolfe;
  if(!data)return;
  nacData=data;
  if(data.vertentes)nacVertentes=data.vertentes;
  document.getElementById('prova-nome').textContent=data.nome||'Prova Nacional';
  if(data.atualizadoEm){
    const d=new Date(data.atualizadoEm);
    document.getElementById('last-update').textContent='Atualizado '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  }
  buildCatBar();
  buildSlides();
});
</script>

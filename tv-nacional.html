<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vizelgolfe — TV Nacional</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Barlow,sans-serif;background:#0f1e35;color:#f0f4f7;overflow:hidden;}

/* HEADER */
.header {
  background: #1a2d4f;
  padding: 15px 30px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 2px solid #d4820a;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  position: relative;
  z-index: 10;
}
.header-left { display: flex; align-items: center; gap: 20px; }
.header-left img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #d4820a; }
.header-title { font-family: "Bebas Neue", sans-serif; font-size: 2.5rem; letter-spacing: 3px; color: #e8960f; line-height: 1; }
.header-subtitle { font-size: 1rem; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 2px; }
.header-right { text-align: right; }
.clock { font-family: "Bebas Neue", sans-serif; font-size: 2rem; color: #fff; letter-spacing: 2px; }
.last-update { font-size: 0.8rem; color: #4ade80; text-transform: uppercase; letter-spacing: 1px; }

/* SCROLL CONTAINER */
.scroll-container {
  height: calc(100vh - 92px);
  overflow: hidden;
  position: relative;
}

.scroll-content {
  padding: 30px;
  display: flex;
  flex-direction: column;
  gap: 40px;
}

/* CATEGORIAS */
.categoria {
  background: rgba(26, 45, 79, 0.6);
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.05);
  overflow: hidden;
}
.cat-title {
  background: #d4820a;
  color: #fff;
  font-family: "Bebas Neue", sans-serif;
  font-size: 2rem;
  padding: 10px 20px;
  letter-spacing: 2px;
}

/* TABELA */
table { width: 100%; border-collapse: collapse; }
th {
  background: rgba(0,0,0,0.4);
  color: rgba(255,255,255,0.5);
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 12px 20px;
  text-align: left;
  font-weight: 600;
}
th.center { text-align: center; }
td {
  padding: 15px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  font-size: 1.2rem;
}
tr:last-child td { border-bottom: none; }
tr.vzg { background: rgba(212, 130, 10, 0.15); }

.rank { font-family: "Bebas Neue", sans-serif; font-size: 1.5rem; color: #e8960f; width: 60px; }
.nome { font-weight: 600; }
.clube { font-size: 1rem; color: rgba(255,255,255,0.6); }
.voltas { font-family: monospace; font-size: 1.1rem; color: rgba(255,255,255,0.8); letter-spacing: 2px; }
.total { font-family: "Bebas Neue", sans-serif; font-size: 1.8rem; color: #4ade80; text-align: center; }
.dnf { color: #ef4444; font-size: 1.2rem; }

/* LOADING */
.loading {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: "Bebas Neue", sans-serif;
  font-size: 3rem;
  color: #e8960f;
  letter-spacing: 5px;
  animation: pulse 1.5s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

</style>
</head>

// O Grupo B é Senhoras e categorias femininas jovens
// MAS a disciplina real vem do Firebase — ver liveConfig
const CAT_GRUPO_A = ['Homens','Juniores Masculinos','Seniores Masculinos','Veteranos Masculinos'];
const CAT_GRUPO_B = ['Senhoras','Juniores Femininos','Seniores Femininos','Veteranos Femininos','Infantis Masculinos','Infantis Femininos'];

// Configuração global lida do Firebase
let liveConfig = null;

function getDisciplina(catName) {
  // Verifica Grupo A
  if (CAT_GRUPO_A.some(g => catName === g || catName.startsWith(g))) {
    return liveConfig.grupoA || 'peter';
  }
  // Verifica Grupo B
  if (CAT_GRUPO_B.some(g => catName === g || catName.startsWith(g))) {
    return liveConfig.grupoB || 'mini';
  }
  // Fallback: tenta inferir pelo nome
  const n = catName.toLowerCase();
  if (n.includes('senhora') || n.includes('feminino') || n.includes('infantil')) {
    return liveConfig.grupoB || 'mini';
  }
  return liveConfig.grupoA || 'peter';
}

function renderCategorias(categorias) {
  const content = document.getElementById('content');
  content.innerHTML = '';

  for (const [catName, atletas] of Object.entries(categorias)) {
    if (!atletas || !atletas.length) continue;

    const maxVoltas = Math.max(...atletas.map(a => a.voltas ? a.voltas.length : 0), 1);

    let html = `
      <div class="categoria">
        <div class="cat-title">${catName}</div>
        <table>
          <thead>
            <tr>
              <th>Pos</th>
              <th>Nome</th>
              <th>Clube</th>
    `;
    
    for(let i=1; i<=maxVoltas; i++) html += `<th class="center">V${i}</th>`;
    
    html += `
              <th class="center">Total</th>
            </tr>
          </thead>
          <tbody>
    `;

    atletas.forEach(a => {
      const isV = isVzg(a.clube);
      html += `<tr class="${isV ? 'vzg' : ''}">
        <td class="rank">${a.rank}º</td>
        <td class="nome">${a.nome}</td>
        <td class="clube">${a.clube}</td>
      `;

      const disciplina = getDisciplina(catName);
      const isMini = disciplina === 'mini';
      const cV = isMini ? corVoltaMini : corVoltaPeter;

      for(let i=0; i<maxVoltas; i++) {
        const v = a.voltas && a.voltas[i] ? a.voltas[i] : '-';
        const s = v!=='-' ? cV(v) : '';
        html += `<td class="center voltas" style="${s}">${v}</td>`;
      }

      const nV=(a.voltas||[]).filter(v=>v>0).length;
      const sCor=a.dnf?'':corTotal(a.total,nV,isMini?'mini':'peter');
      const tot = a.dnf ? '<span class="dnf">DNF</span>' : a.total;
      html += `<td class="center total" style="${sCor}">${tot}</td></tr>`;
    });

    html += `</tbody></table></div>`;
    content.innerHTML += html;
  }
}

// Auto-Scroll
let scrollPos = 0;
let scrollSpeed = 1;
let scrollReq;
let isScrolling = false;

function scrollLoop() {
  const container = document.getElementById('scroll-container');
  const content = document.getElementById('content');
  
  if (content.scrollHeight > container.clientHeight) {
    scrollPos += scrollSpeed;
    if (scrollPos > content.scrollHeight - container.clientHeight + 100) {
      scrollSpeed = 0;
      setTimeout(() => {
        scrollPos = 0;
        scrollSpeed = 1;
      }, 3000);
    }
    content.style.transform = `translateY(-${scrollPos}px)`;
  } else {
    content.style.transform = `translateY(0)`;
  }
  
  scrollReq = requestAnimationFrame(scrollLoop);
}

// Escutar Firestore
onSnapshot(doc(db, 'vizelgolfe', 'nacional'), (docSnap) => {
  if (docSnap.exists()) {
    const docData = docSnap.data();
    const data = docData.bangolfe;

    // Ler configuração de disciplinas guardada pelo nacional.html
   if (docData.bangolfe && docData.bangolfe.grupoA) {
  liveConfig = {
    grupoA: docData.bangolfe.grupoA.vertente || docData.bangolfe.grupoA,
    grupoB: docData.bangolfe.grupoB.vertente || docData.bangolfe.grupoB
  };
} else if (docData.config) {
  liveConfig = docData.config;
}
if (data && data.categorias) renderCategorias(data.categorias);

    if (data) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('prova-nome').textContent = data.nome || 'Prova Nacional';
      
      const d = new Date(data.atualizadoEm);
      document.getElementById('last-update').textContent = 'Atualizado: ' + d.toLocaleTimeString('pt-PT').slice(0,5);

     
if (liveConfig) renderCategorias(data.categorias);
      if (!isScrolling) {
        isScrolling = true;
        scrollLoop();
      }
    }
  }
});

</script>

<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>VIZELGOLFE - BUSCA DE RESGATE</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; }
        .box { border: 1px solid #0f0; padding: 15px; margin-bottom: 20px; }
        h1 { color: #fff; text-decoration: underline; }
        .data-item { color: #fff; background: #222; padding: 10px; margin: 10px 0; border-left: 3px solid #0f0; }
    </style>
</head>
<body>
    <h1>🛰️ VARREDURA TOTAL DE DADOS</h1>
    <div id="status">A iniciar busca profunda...</div>
    <div id="resultados"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDr7wfBzKbH1VAiXbte4YzkejuvJpQvltE",
        authDomain: "vizelgolfe-ec270.firebaseapp.com",
        projectId: "vizelgolfe-ec270",
        storageBucket: "vizelgolfe-ec270.appspot.com",
        messagingSenderId: "386073357614",
        appId: "1:386073357614:web:098f635403f605650e5ebf"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // VAMOS TENTAR TODAS AS POSSIBILIDADES QUE O TEU SISTEMA ANTIGO PODIA USAR
    const colecoesParaTestar = ["vizelgolfe", "competicoes", "campeonato", "ranking", "provas", "socios", "geral"];

    async function buscarTudo() {
        const res = document.getElementById('resultados');
        document.getElementById('status').innerText = "Busca em curso... a testar coleções.";

        for (const col of colecoesParaTestar) {
            try {
                const snap = await db.collection(col).get();
                if (!snap.empty) {
                    res.innerHTML += `<h2>📂 ENCONTRADA COLEÇÃO: [${col}]</h2>`;
                    snap.forEach(doc => {
                        res.innerHTML += `<div class="data-item">
                            <strong>Documento: ${doc.id}</strong><br>
                            <pre>${JSON.stringify(doc.data(), null, 2)}</pre>
                        </div>`;
                    });
                }
            } catch (e) {
                console.log("Erro na pasta " + col);
            }
        }

        if (res.innerHTML === "") {
            res.innerHTML = "<h3>❌ Nenhuma pasta padrão encontrada. A tentar busca por documentos soltos...</h3>";
        }
    }

    // Executa sem precisar de login para ser mais rápido
    buscarTudo();
</script>
</body>
</html>

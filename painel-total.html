<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>VIZELGOLFE ADMIN - RECUPERAÇÃO</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #d4820a; --bg: #0f1e35; --card: #1a2d4f; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; }
        .nav { background: #0a1424; padding: 10px 20px; display: flex; gap: 20px; border-bottom: 2px solid var(--primary); }
        .nav button { background: none; border: none; color: white; cursor: pointer; font-weight: bold; padding: 10px; }
        .nav button.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
        .card { background: var(--card); padding: 25px; border-radius: 12px; margin: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { color: var(--primary); font-size: 13px; text-transform: uppercase; }
        .btn-edit { background: var(--primary); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }
        #login-screen { display: flex; justify-content: center; align-items: center; height: 100vh; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="card" style="width:350px; text-align:center;">
        <h2 style="color:var(--primary)">VIZELGOLFE 2026</h2>
        <input type="email" id="email" placeholder="Email" style="width:90%; padding:10px; margin-bottom:10px; border-radius:5px; border:none;">
        <input type="password" id="pass" placeholder="Senha" style="width:90%; padding:10px; margin-bottom:10px; border-radius:5px; border:none;">
        <button onclick="fazerLogin()" style="width:100%; padding:12px; background:var(--primary); border:none; color:white; font-weight:bold; cursor:pointer; border-radius:5px;">ENTRAR NO SISTEMA</button>
    </div>
</div>

<div id="main-panel" style="display:none;">
    <div class="nav">
        <button class="tab-link active" onclick="openTab(event, 'tab-nacional')">🏆 NACIONAL (CNI)</button>
        <button class="tab-link" onclick="openTab(event, 'tab-interno')">⛳ CAMPEONATO VIZELA</button>
        <button class="tab-link" onclick="openTab(event, 'tab-bonus')">⭐ TORNEIO REIS / BÓNUS</button>
        <button style="margin-left:auto; color:#ff4444" onclick="location.reload()">SAIR</button>
    </div>

    <div id="tab-nacional" class="tab-content active">
        <div class="card">
            <h3>Atualizar Ranking Nacional</h3>
            <p>ID da Prova no Bangolfe:</p>
            <input type="text" id="id-prova" placeholder="Ex: 1541" style="padding:10px; border-radius:5px; border:none;">
            <button onclick="puxarNacional()" class="btn-edit" style="padding:10px 20px; font-size:14px;">ATUALIZAR DADOS</button>
            <div id="status-nacional" style="margin-top:10px; color:#4ade80;"></div>
        </div>
    </div>

    <div id="tab-interno" class="tab-content" style="display:none;">
        <div class="card">
            <h3>Provas de Janeiro a Dezembro</h3>
            <div id="lista-meses">A procurar dados das jornadas...</div>
        </div>
    </div>

    <div id="tab-bonus" class="tab-content" style="display:none;">
        <div class="card">
            <h3>Bónus e Torneios Especiais</h3>
            <div id="lista-especiais">A carregar regras e classificações...</div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDr7wfBzKbH1VAiXbte4YzkejuvJpQvltE",
        authDomain: "vizelgolfe-ec270.firebaseapp.com",
        projectId: "vizelgolfe-ec270",
        storageBucket: "vizelgolfe-ec270.appspot.com",
        messagingSenderId: "386073357614",
        appId: "1:386073357614:web:098f635403f605650e5ebf"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function fazerLogin() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        firebase.auth().signInWithEmailAndPassword(email, pass).then(() => {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-panel').style.display = 'block';
            recuperarDadosVizela();
        }).catch(() => alert("Acesso negado! Verifica os dados."));
    }

    function openTab(evt, tabName) {
        let contents = document.getElementsByClassName("tab-content");
        for (let c of contents) c.style.display = "none";
        let links = document.getElementsByClassName("tab-link");
        for (let l of links) l.classList.remove("active");
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.classList.add("active");
    }

    // ESTA FUNÇÃO É A CHAVE PARA O TEU "UAU"
    function recuperarDadosVizela() {
        // Tenta ler a coleção raiz para encontrar Janeiro, Fevereiro, etc.
        db.collection('vizelgolfe').get().then(snapshot => {
            let htmlMeses = "<table><tr><th>Mês / Jornada</th><th>Acções</th></tr>";
            let htmlEspeciais = "<table><tr><th>Torneio / Regra</th><th>Estado</th></tr>";

            snapshot.forEach(doc => {
                const id = doc.id.toLowerCase();
                if(id.includes('janeiro') || id.includes('fevereiro') || id.includes('março') || id.includes('jornada')) {
                    htmlMeses += `<tr><td>${doc.id}</td><td><button class="btn-edit" onclick="verDetalhes('${doc.id}')">VER RESULTADOS</button></td></tr>`;
                } else {
                    htmlEspeciais += `<tr><td>${doc.id}</td><td>✅ Dados Protegidos</td></tr>`;
                }
            });

            document.getElementById('lista-meses').innerHTML = htmlMeses + "</table>";
            document.getElementById('lista-especiais').innerHTML = htmlEspeciais + "</table>";
        });
    }

    function verDetalhes(idDoc) {
        alert("A abrir detalhes da prova: " + idDoc);
        // Aqui podemos expandir para mostrar a tabela completa de cada mês
    }

    function puxarNacional() {
        document.getElementById('status-nacional').innerText = "A ligar ao Bangolfe...";
    }
</script>
</body>
</html>

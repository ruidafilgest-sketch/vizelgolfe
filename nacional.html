<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vizelgolfe — Resultados Nacionais</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --navy:   #1a2d4f;
  --navy2:  #0f1e35;
  --orange: #d4820a;
  --org2:   #e8960f;
  --text:   #1a1e28;
  --silver: #556070;
  --dim:    #909aa4;
  --bg:     #f7f8fa;
  --bg2:    #ffffff;
  --green:  #1a8a4a;
  --red:    #cc2222;
  --sep:    #e2e6ec;
  --vzg:    rgba(212,130,10,0.08);
  --vzg-br: rgba(212,130,10,0.4);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;min-height:100%;background:var(--bg);color:var(--text);font-family:"Barlow Condensed",sans-serif;}

/* HEADER */
header{
  background:var(--navy2);border-bottom:3px solid var(--orange);
  display:flex;align-items:center;padding:0 32px;height:64px;gap:16px;
  position:sticky;top:0;z-index:100;
}
header img{width:42px;height:42px;border-radius:50%;border:2px solid var(--orange);}
.htitle{display:flex;flex-direction:column;}
.htitle .t1{font-family:"Bebas Neue",sans-serif;font-size:1.3rem;letter-spacing:5px;color:var(--org2);line-height:1;}
.htitle .t2{font-family:"Barlow",sans-serif;font-size:0.6rem;letter-spacing:2px;color:rgba(255,255,255,0.35);text-transform:uppercase;}
#status-bar{margin-left:auto;display:flex;align-items:center;gap:16px;}
#auto-status{font-family:"Barlow",sans-serif;font-size:0.72rem;color:rgba(255,255,255,0.5);letter-spacing:1px;}
#countdown{font-family:"Bebas Neue",sans-serif;font-size:1.1rem;letter-spacing:2px;color:var(--org2);}
#live-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;display:none;}
#live-dot.on{display:block;animation:blink 1.5s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

/* MAIN */
main{max-width:1200px;margin:0 auto;padding:24px 20px;}

/* PAINEL CONFIG */
#painel-config{
  background:var(--bg2);border:1px solid var(--sep);border-radius:10px;
  padding:20px 24px;margin-bottom:24px;
  box-shadow:0 1px 4px rgba(0,0,0,0.06);
}
.config-titulo{font-family:"Bebas Neue",sans-serif;font-size:1.1rem;letter-spacing:3px;color:var(--navy);margin-bottom:14px;}
.config-row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;}
.config-group{display:flex;flex-direction:column;gap:5px;flex:1;min-width:200px;}
.config-group label{font-size:0.72rem;letter-spacing:1px;color:var(--dim);text-transform:uppercase;}
.config-group input{
  padding:8px 12px;border:1px solid var(--sep);border-radius:6px;
  background:var(--bg);color:var(--text);font-size:0.85rem;font-family:"Barlow",sans-serif;
}
.config-group input:focus{outline:none;border-color:var(--orange);}
.btn{
  padding:9px 18px;border:none;border-radius:6px;cursor:pointer;
  font-family:"Barlow Condensed",sans-serif;font-size:0.85rem;font-weight:700;
  letter-spacing:1px;transition:all 0.2s;white-space:nowrap;
}
.btn-primary{background:var(--orange);color:#fff;}
.btn-primary:hover{background:var(--org2);}
.btn-secondary{background:#e8eaf0;color:var(--text);}
.btn-secondary:hover{background:#d8dae0;}
.btn-stop{background:#dc2626;color:#fff;}
.btn-stop:hover{background:#b91c1c;}
#msg-config{font-size:0.8rem;margin-top:10px;padding:8px 12px;border-radius:6px;display:none;}
.msg-ok{background:#d4edda;color:#155724;}
.msg-err{background:#f8d7da;color:#721c24;}
.msg-info{background:#d1ecf1;color:#0c5460;}

/* PROVA INFO */
#prova-info{
  background:var(--navy);border-radius:10px;padding:16px 24px;
  margin-bottom:20px;display:none;
  display:flex;align-items:center;gap:20px;flex-wrap:wrap;
}
#prova-info .pnome{font-family:"Bebas Neue",sans-serif;font-size:1.3rem;letter-spacing:3px;color:var(--org2);}
#prova-info .pmeta{font-family:"Barlow",sans-serif;font-size:0.75rem;color:rgba(255,255,255,0.45);margin-top:2px;}
#prova-info .plink{font-size:0.7rem;color:var(--org2);text-decoration:none;}
#prova-info .plink:hover{text-decoration:underline;}
#prova-stats{margin-left:auto;display:flex;gap:20px;flex-wrap:wrap;}
.pstat{text-align:center;}
.pstat .n{font-family:"Bebas Neue",sans-serif;font-size:1.4rem;color:var(--org2);}
.pstat .l{font-size:0.65rem;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:1px;}

/* CATEGORIA TABS */
#cat-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.cat-tab{
  padding:5px 14px;border:1px solid var(--sep);border-radius:20px;
  font-size:0.75rem;letter-spacing:1px;cursor:pointer;background:var(--bg2);
  transition:all 0.15s;text-transform:uppercase;
}
.cat-tab:hover{border-color:var(--orange);}
.cat-tab.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.cat-tab .vzg-count{font-size:0.65rem;color:var(--org2);margin-left:4px;}

/* TABELA */
.tbl-wrap{overflow-x:auto;background:var(--bg2);border-radius:10px;border:1px solid var(--sep);box-shadow:0 1px 4px rgba(0,0,0,0.05);}
table{width:100%;border-collapse:collapse;}
thead th{
  font-size:0.62rem;letter-spacing:2px;color:var(--dim);text-transform:uppercase;
  padding:8px 16px;text-align:left;background:#f0f3f8;border-bottom:2px solid var(--sep);
  white-space:nowrap;
}
th.c{text-align:center;}
th.r{text-align:right;}
tbody tr{border-bottom:1px solid var(--sep);cursor:pointer;transition:background 0.15s;}
tbody tr:hover{background:#f0f3f8;}
tbody tr.vzg{background:var(--vzg);border-left:3px solid var(--orange);}
tbody tr.vzg:hover{background:rgba(212,130,10,0.13);}
tbody tr.dnf{opacity:0.6;}
tbody td{padding:11px 16px;font-size:1.1rem;}
.td-pos{font-family:"Bebas Neue",sans-serif;font-size:1.2rem;color:var(--dim);text-align:center;width:48px;}
.pos-1 .td-pos{color:var(--orange);}
.pos-2 .td-pos{color:#6080a0;}
.pos-3 .td-pos{color:#a07050;}
.td-nome{font-weight:700;font-size:1.15rem;}
.vzg .td-nome::before{content:"🟡 ";}
.td-clube{font-size:0.78rem;color:var(--silver);}
.td-vol{text-align:center;font-size:0.82rem;color:var(--silver);min-width:28px;}
.td-tot{font-family:"Bebas Neue",sans-serif;font-size:1.4rem;text-align:right;padding-right:20px!important;}
.pos-1 .td-tot{color:var(--orange);}
.td-dnf{font-size:0.7rem;color:var(--red);font-weight:700;text-align:center;}

/* MODAL ATLETA */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:500;padding:20px;}
#modal-overlay.on{display:flex;}
#modal{background:var(--bg2);border-radius:12px;width:100%;max-width:700px;max-height:90vh;overflow-y:auto;padding:28px;}
#modal-close{float:right;background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--dim);}
#modal-nome{font-family:"Bebas Neue",sans-serif;font-size:1.6rem;letter-spacing:3px;color:var(--navy);margin-bottom:4px;}
#modal-meta{font-size:0.8rem;color:var(--silver);margin-bottom:20px;}
#modal-body table{width:100%;}
#modal-body thead th{font-size:0.65rem;letter-spacing:2px;padding:6px 12px;}
#modal-body tbody td{padding:9px 12px;font-size:0.88rem;}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--dim);font-family:"Barlow",sans-serif;font-size:0.9rem;letter-spacing:1px;text-transform:uppercase;line-height:2.5;}

/* FOOTER */
footer{text-align:center;padding:24px;font-size:0.72rem;color:var(--dim);border-top:1px solid var(--sep);margin-top:40px;}

@media(max-width:600px){
  main{padding:12px;}
  .config-row{flex-direction:column;}
  header{padding:0 16px;}
}
</style>
</head>

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:"AIzaSyDr7wfBzKbH1VAiXbte4YzkejuvJpQvltE",
    authDomain:"vizelgolfe-ec270.firebaseapp.com",
    projectId:"vizelgolfe-ec270",
    storageBucket:"vizelgolfe-ec270.firebasestorage.app",
    messagingSenderId:"386073357614",
    appId:"1:386073357614:web:098f635403f605650e5ebf"
  };
  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // ── ESTADO ──
  let dadosAtuais   = null;
  let catAtiva      = null;
  let urlAtiva      = null;
  let nomeAtivo     = null;
  let intervaloId   = null;
  let countdownId   = null;
  let segsRestantes = 0;
  const CORS_PROXY  = 'https://api.allorigins.win/raw?url=';

  // ── CATEGORIAS ──
  const CAT_ORDEM = ['Homens','Senhoras','Juniores Masculinos','Juniores Femininos',
    'Infantis Masculinos','Infantis Femininos','Seniores Masculinos','Seniores Femininos',
    'Veteranos Masculinos','Veteranos Femininos'];

  function isVzg(clube) { return clube && clube.toLowerCase().includes('vizelgolfe'); }

  // ── MOSTRAR MENSAGEM ──
  function msg(texto, tipo) {
    const el = document.getElementById('msg-config');
    el.textContent = texto;
    el.className = 'msg-' + tipo;
    el.style.display = 'block';
    if (tipo === 'ok') setTimeout(() => el.style.display='none', 4000);
  }

  // ── FETCH DO BANGOLFE ──
  async function fetchBangolfe(url) {
    const proxyUrl = CORS_PROXY + encodeURIComponent(url);
    const resp = await fetch(proxyUrl);
    if (!resp.ok) throw new Error('Não foi possível aceder ao site da FPM');
    const html = await resp.text();
    return parseBangolfe(html);
  }

  // ── PARSER HTML BANGOLFE ──
  function parseBangolfe(html) {
    const parser = new DOMParser();
    const doc2 = parser.parseFromString(html, 'text/html');
    const tables = doc2.querySelectorAll('table');
    const categorias = {};
    let catAtual = null;

    tables.forEach(tbl => {
      // Detetar nome de categoria (primeira célula com colspan ou texto simples)
      const rows = tbl.querySelectorAll('tr');
      rows.forEach(row => {
        const cells = row.querySelectorAll('td, th');
        if (!cells.length) return;
        const primeiro = cells[0].textContent.trim();

        // Verificar se é cabeçalho de categoria
        const cats = ['Homens','Senhoras','Juniores Masculinos','Juniores Femininos',
          'Infantis Masculinos','Infantis Femininos','Seniores Masculinos','Seniores Femininos',
          'Veteranos Masculinos','Veteranos Femininos'];
        const catMatch = cats.find(c => primeiro.includes(c));
        if (catMatch) { catAtual = catMatch; if (!categorias[catAtual]) categorias[catAtual] = []; return; }

        // Verificar se é linha de dados (primeira célula é número = rank)
        const rank = parseInt(primeiro);
        if (!catAtual || isNaN(rank)) return;

        // Extrair células
        const vals = Array.from(cells).map(c => c.textContent.trim());
        if (vals.length < 4) return;

        const nome  = vals[1] || '—';
        const clube = vals[2] || '—';

        // Extrair voltas (valores numéricos nas colunas 3 em diante, excluindo médias/somas)
        const voltas = [];
        for (let i = 3; i < vals.length - 4; i++) {
          const v = parseInt(vals[i]);
          if (!isNaN(v) && v > 0 && v < 100) voltas.push(v);
        }

        // Total é a última coluna numérica antes de "Não terminou"
        const ultimaCell = vals[vals.length - 1];
        const dnf = ultimaCell.includes('Não terminou') || ultimaCell.includes('terminou');
        const totalStr = dnf ? vals[vals.length - 2] : vals[vals.length - 1];
        const total = parseInt(totalStr) || 0;

        categorias[catAtual].push({ rank, nome, clube, voltas, total, completo: !dnf, dnf });
      });
    });

    return categorias;
  }

  // ── CARREGAR AGORA ──
  window.carregarAgora = async function() {
    const url = document.getElementById('inp-url').value.trim();
    if (!url) { msg('Cola o URL da prova da FPM!', 'err'); return; }
    msg('⏳ A carregar resultados...', 'info');
    try {
      const cats = await fetchBangolfe(url);
      const totalCats = Object.keys(cats).length;
      const totalAtletas = Object.values(cats).reduce((s,a) => s+a.length, 0);
      if (!totalAtletas) throw new Error('Não foram encontrados resultados nesta página');

      dadosAtuais = {
        url, nome: document.getElementById('inp-nome').value.trim() || extrairNome(url),
        atualizadoEm: new Date().toISOString(), categorias: cats
      };
      nomeAtivo = dadosAtuais.nome;
      urlAtiva  = url;

      // Guardar no Firebase
      await setDoc(doc(db, 'vizelgolfe', 'nacional'), { bangolfe: dadosAtuais });

      msg(`✅ ${totalAtletas} atletas em ${totalCats} categorias`, 'ok');
      renderTudo();
    } catch(e) {
      msg('❌ Erro: ' + e.message, 'err');
    }
  };

  // ── AUTO ATUALIZAÇÃO ──
  window.iniciarAuto = async function() {
    const url = document.getElementById('inp-url').value.trim();
    if (!url) { msg('Cola o URL primeiro!', 'err'); return; }
    const mins = parseInt(document.getElementById('inp-intervalo').value);

    await window.carregarAgora();

    segsRestantes = mins * 60;
    intervaloId = setInterval(async () => { await window.carregarAgora(); segsRestantes = mins * 60; }, mins * 60 * 1000);
    countdownId = setInterval(() => {
      segsRestantes--;
      const m = Math.floor(segsRestantes/60), s = segsRestantes % 60;
      document.getElementById('countdown').textContent = `${m}:${String(s).padStart(2,'0')}`;
    }, 1000);

    document.getElementById('live-dot').classList.add('on');
    document.getElementById('auto-status').textContent = 'A atualizar cada ' + mins + ' min';
    document.getElementById('btn-stop').style.display = '';
  };

  window.pararAuto = function() {
    clearInterval(intervaloId); clearInterval(countdownId);
    intervaloId = countdownId = null;
    document.getElementById('live-dot').classList.remove('on');
    document.getElementById('auto-status').textContent = 'Parado';
    document.getElementById('countdown').textContent = '';
    document.getElementById('btn-stop').style.display = 'none';
    msg('Atualização automática parada.', 'info');
  };

  function extrairNome(url) {
    const m = url.match(/\/(\d{4})\/([^\/]+)\//);
    return m ? m[2].toUpperCase() + ' ' + m[1] : 'Prova Nacional';
  }

  // ── RENDER ──
  function renderTudo() {
    if (!dadosAtuais) return;
    const cats = dadosAtuais.categorias;

    // Prova info
    const pi = document.getElementById('prova-info');
    pi.style.display = 'flex';
    document.getElementById('pi-nome').textContent = dadosAtuais.nome;
    const upd = new Date(dadosAtuais.atualizadoEm);
    document.getElementById('pi-meta').textContent = 'Última atualização: ' + upd.toLocaleTimeString('pt-PT');
    const link = document.getElementById('pi-link');
    link.href = dadosAtuais.url; link.textContent = 'Ver original ↗';
    const totalAtletas = Object.values(cats).reduce((s,a)=>s+a.length,0);
    const totalVzg = Object.values(cats).reduce((s,a)=>s+a.filter(x=>isVzg(x.clube)).length,0);
    document.getElementById('pi-atletas').textContent = totalAtletas;
    document.getElementById('pi-vzg').textContent = totalVzg;
    document.getElementById('pi-cats').textContent = Object.keys(cats).length;
    document.getElementById('pi-upd').textContent = upd.toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'});

    // Tabs categorias
    const tabsEl = document.getElementById('cat-tabs');
    const catsOrdenadas = CAT_ORDEM.filter(c => cats[c] && cats[c].length);
    if (!catAtiva || !cats[catAtiva]) catAtiva = catsOrdenadas[0];

    tabsEl.innerHTML = catsOrdenadas.map(c => {
      const vzgN = cats[c].filter(a => isVzg(a.clube)).length;
      return `<div class="cat-tab${c===catAtiva?' on':''}" onclick="mudarCat('${c}')">
        ${c}${vzgN?`<span class="vzg-count">(${vzgN}🟡)</span>`:''}
      </div>`;
    }).join('');

    renderCategoria();
  }

  function renderCategoria() {
    if (!dadosAtuais || !catAtiva) return;
    const atletas = dadosAtuais.categorias[catAtiva] || [];
    const cont = document.getElementById('conteudo');

    if (!atletas.length) { cont.innerHTML = '<div class="empty">Sem atletas nesta categoria.</div>'; return; }

    // Descobrir nº de voltas
    const maxV = Math.max(...atletas.map(a => (a.voltas||[]).length), 0);
    const voltasCols = maxV ? Array.from({length:maxV},(_,i)=>`<th class="c">V${i+1}</th>`).join('') : '';

    let html = `<div class="tbl-wrap"><table>
      <thead><tr>
        <th class="c">Pos</th><th>Atleta</th><th>Clube</th>
        ${voltasCols}
        <th class="r">Total</th><th class="c">Sit.</th>
      </tr></thead><tbody>`;

    atletas.forEach((a,i) => {
      const vzg = isVzg(a.clube);
      const posClass = i===0?'pos-1':i===1?'pos-2':i===2?'pos-3':'';
      const voltasCells = (a.voltas||[]).map(v=>`<td class="td-vol">${v}</td>`).join('');
      const vazios = maxV - (a.voltas||[]).length;
      const vaziosCells = Array(vazios).fill('<td class="td-vol">—</td>').join('');
      html += `<tr class="${posClass}${vzg?' vzg':''}${a.dnf?' dnf':''}" onclick="abrirModal(${JSON.stringify(a).replace(/"/g,'&quot;')})">
        <td class="td-pos">${a.rank||'—'}</td>
        <td class="td-nome">${a.nome}</td>
        <td class="td-clube">${a.clube}</td>
        ${voltasCells}${vaziosCells}
        <td class="td-tot">${a.total||'—'}</td>
        <td class="td-dnf">${a.dnf?'DNF':a.completo?'✅':'⏳'}</td>
      </tr>`;
    });

    html += '</tbody></table></div>';
    cont.innerHTML = html;
  }

  window.mudarCat = function(cat) {
    catAtiva = cat;
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.toggle('on', t.textContent.trim().startsWith(cat)));
    renderCategoria();
  };

  // ── MODAL ATLETA ──
  window.abrirModal = function(atleta) {
    document.getElementById('modal-nome').textContent = atleta.nome;
    document.getElementById('modal-meta').textContent = atleta.clube + ' · ' + catAtiva;
    const voltas = atleta.voltas || [];
    let html = '';
    if (voltas.length) {
      html += `<table><thead><tr>${voltas.map((_,i)=>`<th class="c">Percurso ${i+1}</th>`).join('')}<th class="r">Total</th></tr></thead>
      <tbody><tr>${voltas.map(v=>`<td style="text-align:center;font-size:1.1rem;font-weight:600">${v}</td>`).join('')}
      <td style="text-align:right;font-family:Bebas Neue,sans-serif;font-size:1.5rem;color:var(--orange)">${atleta.total}</td>
      </tr></tbody></table>`;
    } else {
      html = '<p style="color:var(--dim);font-size:0.9rem">Sem detalhe de percursos disponível.</p>';
    }
    html += `<div style="margin-top:16px;padding:12px;background:var(--bg);border-radius:8px;font-size:0.82rem;color:var(--silver)">
      Posição: <strong>${atleta.rank}º</strong> · 
      Total: <strong>${atleta.total}</strong> · 
      ${atleta.dnf?'<span style="color:var(--red)">Não terminou (DNF)</span>':atleta.completo?'<span style="color:var(--green)">Completou</span>':'<span style="color:var(--orange)">Em curso</span>'}
    </div>`;
    document.getElementById('modal-body').innerHTML = html;
    document.getElementById('modal-overlay').classList.add('on');
  };

  window.fecharModal = function(e) {
    if (e.target === document.getElementById('modal-overlay'))
      document.getElementById('modal-overlay').classList.remove('on');
  };

  // ── CARREGAR DO FIREBASE AO INICIAR E ESCUTAR ALTERAÇÕES ──
  onSnapshot(doc(db, 'vizelgolfe', 'nacional'), (snap) => {
    if (snap.exists()) {
      const d = snap.data();
      if (d.bangolfe) {
        dadosAtuais = d.bangolfe;
        document.getElementById('inp-url').value = dadosAtuais.url || '';
        document.getElementById('inp-nome').value = dadosAtuais.nome || '';
        
        // Se a categoria ativa não existir nos novos dados, limpa-a
        if (catAtiva && (!dadosAtuais.categorias || !dadosAtuais.categorias[catAtiva])) {
          catAtiva = null;
        }
        
        renderTudo();
        document.getElementById('auto-status').textContent = 'Dados atualizados em tempo real';
      }
    } else {
      console.log('Sem dados anteriores');
    }
  }, (error) => {
    console.error("Erro ao escutar dados:", error);
    msg('Erro ao ligar à base de dados.', 'err');
  });
  </script>
</body>
</html>

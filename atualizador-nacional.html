<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vizelgolfe — Atualizador Nacional</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Barlow,sans-serif;background:#0f1e35;color:#f0f4f7;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.card{background:#1a2d4f;border-radius:16px;padding:32px;width:100%;max-width:520px;border:1px solid rgba(212,130,10,0.3);}
img{width:70px;height:70px;border-radius:50%;border:2px solid #d4820a;display:block;margin:0 auto 16px;}
h1{font-family:"Bebas Neue",sans-serif;font-size:1.8rem;letter-spacing:5px;color:#e8960f;text-align:center;margin-bottom:4px;}
p{font-size:0.85rem;color:rgba(255,255,255,0.45);text-align:center;margin-bottom:24px;line-height:1.6;}

.form-group{margin-bottom:14px;}
.form-group label{font-size:0.72rem;letter-spacing:2px;color:rgba(255,255,255,0.45);text-transform:uppercase;display:block;margin-bottom:6px;}
.form-group input, .form-group select{
  width:100%;padding:10px 14px;border:1px solid rgba(255,255,255,0.1);border-radius:8px;
  background:rgba(255,255,255,0.05);color:#f0f4f7;font-size:0.88rem;font-family:Barlow,sans-serif;
}
.form-group input:focus,.form-group select:focus{outline:none;border-color:#d4820a;}

.btns{display:flex;gap:10px;margin-top:20px;}
.btn{flex:1;padding:12px;border:none;border-radius:8px;font-size:0.9rem;font-weight:700;cursor:pointer;font-family:Barlow,sans-serif;letter-spacing:1px;transition:all 0.2s;}
.btn-start{background:#d4820a;color:#fff;}
.btn-start:hover{background:#e8960f;}
.btn-start:disabled{background:#555;cursor:not-allowed;}
.btn-stop{background:#dc2626;color:#fff;display:none;}
.btn-stop:hover{background:#b91c1c;}
.btn-now{background:rgba(255,255,255,0.1);color:#f0f4f7;}
.btn-now:hover{background:rgba(255,255,255,0.15);}

/* STATUS */
.status-box{margin-top:20px;border-radius:10px;overflow:hidden;}
.status-header{
  display:flex;align-items:center;gap:10px;
  background:rgba(0,0,0,0.3);padding:12px 16px;
}
.dot{width:10px;height:10px;border-radius:50%;background:#6b7280;flex-shrink:0;}
.dot.verde{background:#4ade80;animation:pulse 1.5s ease-in-out infinite;}
.dot.laranja{background:#f59e0b;}
.dot.vermelho{background:#ef4444;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.7)}}
.status-text{font-size:0.85rem;font-weight:600;}
.status-sub{font-size:0.72rem;color:rgba(255,255,255,0.4);margin-left:auto;}

/* LOG */
.log{background:rgba(0,0,0,0.4);padding:12px 16px;max-height:200px;overflow-y:auto;font-size:0.75rem;font-family:monospace;line-height:1.8;}
.log-entry{border-bottom:1px solid rgba(255,255,255,0.05);padding:3px 0;}
.log-ok{color:#4ade80;}
.log-err{color:#f87171;}
.log-info{color:#60a5fa;}

/* COUNTDOWN */
.countdown{
  text-align:center;margin-top:16px;
  font-family:"Bebas Neue",sans-serif;font-size:2.5rem;letter-spacing:4px;
  color:#e8960f;display:none;
}
.countdown span{font-size:0.75rem;display:block;letter-spacing:3px;color:rgba(255,255,255,0.35);font-family:Barlow,sans-serif;margin-top:-8px;}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px;}
.stat{background:rgba(0,0,0,0.3);border-radius:8px;padding:10px;text-align:center;}
.stat .n{font-family:"Bebas Neue",sans-serif;font-size:1.5rem;color:#e8960f;}
.stat .l{font-size:0.65rem;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:1px;}
</style>
</head>

let intervaloId  = null;
let countdownId  = null;
let segsRest     = 0;
let nAtualizacoes = 0;

const PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://thingproxy.freeboard.io/fetch/${url}`,
  url => `https://proxy.cors.sh/${url}`,
];

function isVzg(clube) { return clube && clube.toLowerCase().includes('vizelgolfe'); }

function log(msg, tipo) {
  const logEl = document.getElementById('log');
  const entry = document.createElement('div');
  entry.className = 'log-entry log-' + (tipo||'info');
  const hora = new Date().toLocaleTimeString('pt-PT');
  entry.textContent = `[${hora}] ${msg}`;
  logEl.insertBefore(entry, logEl.firstChild);
  if (logEl.children.length > 50) logEl.removeChild(logEl.lastChild);
}

function setStatus(texto, sub, dotClass) {
  document.getElementById('status-text').textContent = texto;
  document.getElementById('status-sub').textContent  = sub || '';
  const dot = document.getElementById('dot');
  dot.className = 'dot ' + (dotClass||'');
}

// Tentar vários proxies até um funcionar
async function fetchComProxy(url) {
  for (const proxyFn of PROXIES) {
    try {
      const proxyUrl = proxyFn(url);
      const resp = await fetch(proxyUrl, {signal: AbortSignal.timeout(8000)});
      if (resp.ok) {
        const text = await resp.text();
        if (text && text.length > 500) return text;
      }
    } catch(e) { /* tentar próximo */ }
  }
  throw new Error('Todos os proxies falharam');
}

function parseBangolfe(html) {
  const parser = new DOMParser();
  const d = parser.parseFromString(html, 'text/html');
  const categorias = {};
  const CATS = ['Homens','Senhoras','Juniores Masculinos','Juniores Femininos',
    'Infantis Masculinos','Infantis Femininos','Seniores Masculinos','Seniores Femininos',
    'Veteranos Masculinos','Veteranos Femininos'];

  let catAtual = null;

  d.querySelectorAll('table tr').forEach(row => {
    const cells = Array.from(row.querySelectorAll('td,th')).map(c => c.textContent.trim());
    if (!cells.length) return;

    const catMatch = CATS.find(c => cells[0] === c || (cells[0].includes(c) && cells.length < 4));
    if (catMatch) { catAtual = catMatch; if (!categorias[catAtual]) categorias[catAtual] = []; return; }

    const rank = parseInt(cells[0]);
    if (!catAtual || isNaN(rank) || rank < 1 || rank > 500) return;
    if (cells.length < 4) return;

    const nome  = cells[1] || '—';
    const clube = cells[2] || '—';
    const ultimaCell = cells[cells.length - 1];
    const dnf = ultimaCell.includes('terminou');

    // Voltas: valores entre 10 e 99, nas colunas 3 até penúltimas 4
    const voltas = [];
    for (let i = 3; i < cells.length - 4; i++) {
      const v = parseInt(cells[i]);
      if (!isNaN(v) && v >= 10 && v <= 99) voltas.push(v);
    }

    // Total
    const totalStr = dnf ? cells[cells.length - 2] : cells[cells.length - 1];
    const total = parseInt(totalStr) || 0;

    categorias[catAtual].push({ rank, nome, clube, voltas, total, completo: !dnf, dnf });
  });

  return categorias;
}

async function atualizarAgora() {
  const url = document.getElementById('inp-url').value.trim();
  if (!url) { log('URL em falta!', 'err'); return; }

  setStatus('A carregar...', '', 'laranja');
  log('A buscar resultados...', 'info');

  try {
    const html = await fetchComProxy(url);
    const cats = parseBangolfe(html);
    const totalCats = Object.keys(cats).length;
    const totalAtletas = Object.values(cats).reduce((s,a) => s+a.length, 0);
    const totalVzg = Object.values(cats).reduce((s,a) => s+a.filter(x=>isVzg(x.clube)).length, 0);

    if (!totalAtletas) throw new Error('Sem atletas encontrados — verifica o URL');

    const dados = {
      bangolfe: {
        url,
        nome: document.getElementById('inp-nome').value.trim() || extrairNome(url),
        atualizadoEm: new Date().toISOString(),
        atualizadoPor: auth.currentUser.email,
        adminUid: auth.currentUser.uid,
        categorias: cats
      }
    };

    await setDoc(doc(db, 'vizelgolfe', 'nacional'), dados, { merge: true });

    nAtualizacoes++;
    document.getElementById('st-atletas').textContent = totalAtletas;
    document.getElementById('st-vzg').textContent = totalVzg;
    document.getElementById('st-upd').textContent = nAtualizacoes;
    document.getElementById('stats').style.display = 'grid';

    setStatus('✅ Atualizado', new Date().toLocaleTimeString('pt-PT'), 'verde');
    log(`✅ ${totalAtletas} atletas · ${totalVzg} Vizelgolfe · ${totalCats} categorias`, 'ok');

  } catch(e) {
    setStatus('❌ Erro', e.message, 'vermelho');
    log('❌ ' + e.message, 'err');
  }
}

function extrairNome(url) {
  const m = url.match(/\/([\w]+)\/result/);
  return m ? m[1].toUpperCase() + ' 2026' : 'Prova Nacional';
}

function iniciarCountdown(mins) {
  segsRest = mins * 60;
  clearInterval(countdownId);
  const el = document.getElementById('countdown');
  el.style.display = 'block';
  countdownId = setInterval(() => {
    segsRest--;
    if (segsRest < 0) segsRest = 0;
    const m = Math.floor(segsRest/60);
    const s = segsRest % 60;
    el.childNodes[0].textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  }, 1000);
}

window.iniciar = async function() {
  const url = document.getElementById('inp-url').value.trim();
  if (!url) { alert('Cola o URL da prova!'); return; }
  const mins = parseInt(document.getElementById('inp-mins').value);

  document.getElementById('btn-start').style.display = 'none';
  document.getElementById('btn-stop').style.display = 'flex';
  document.getElementById('status-box').style.display = 'block';
  document.getElementById('inp-url').disabled = true;
  document.getElementById('inp-nome').disabled = true;
  document.getElementById('inp-mins').disabled = true;

  await atualizarAgora();
  iniciarCountdown(mins);

  intervaloId = setInterval(async () => {
    await atualizarAgora();
    iniciarCountdown(mins);
  }, mins * 60 * 1000);
};

window.parar = function() {
  clearInterval(intervaloId);
  clearInterval(countdownId);
  intervaloId = countdownId = null;
  document.getElementById('btn-start').style.display = 'flex';
  document.getElementById('btn-stop').style.display = 'none';
  document.getElementById('countdown').style.display = 'none';
  document.getElementById('inp-url').disabled = false;
  document.getElementById('inp-nome').disabled = false;
  document.getElementById('inp-mins').disabled = false;
  setStatus('Parado', '', '');
  log('⏹ Atualização automática parada', 'info');
};

window.atualizarAgora = atualizarAgora;
</script>

<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vizelgolfe · Sistema de Resultados</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'DM Sans',sans-serif;
  background:#0a1520;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:40px 20px;
}

.portal{width:100%;max-width:680px;text-align:center}

/* Logo */
.logo-wrap{margin-bottom:24px}
.logo-wrap img{
  width:160px;height:160px;
  object-fit:contain;border-radius:50%;
  box-shadow:0 0 0 3px rgba(200,148,50,.6), 0 12px 50px rgba(0,0,0,.7);
}

/* Linha dourada */
.linha{width:60px;height:2px;background:#c8943a;margin:22px auto 18px;border-radius:2px}

.eyebrow{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:rgba(200,148,50,.9);font-weight:500;margin-bottom:4px}
.sub{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:400;color:rgba(255,255,255,.45);letter-spacing:.5px;margin-bottom:40px;font-style:italic}

/* Cartões */
.cartoes{
  display:grid;grid-template-columns:1fr 1fr;
  gap:16px;
  margin-bottom:32px;
}

/* Cartão AZUL — TV Interno */
.cartao-azul{
  background:linear-gradient(145deg,#0e2d5e,#1a4a8a);
  border:2px solid rgba(100,160,255,.35);
  border-radius:18px;
  padding:48px 24px 42px;
  cursor:pointer;text-decoration:none;
  display:flex;flex-direction:column;align-items:center;
  transition:all .25s ease;
  position:relative;overflow:hidden;
}
.cartao-azul::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,#5aa0ff,transparent);
}
.cartao-azul:hover{
  background:linear-gradient(145deg,#122f60,#1e52a0);
  border-color:rgba(100,160,255,.65);
  transform:translateY(-4px);
  box-shadow:0 16px 40px rgba(20,80,200,.45);
}

/* Cartão DOURADO — TV Nacional */
.cartao-ouro{
  background:linear-gradient(145deg,#3a2200,#7a4a00);
  border:2px solid rgba(220,165,50,.4);
  border-radius:18px;
  padding:48px 24px 42px;
  cursor:pointer;text-decoration:none;
  display:flex;flex-direction:column;align-items:center;
  transition:all .25s ease;
  position:relative;overflow:hidden;
}
.cartao-ouro::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,#c8943a,transparent);
}
.cartao-ouro:hover{
  background:linear-gradient(145deg,#422800,#8a5500);
  border-color:rgba(220,165,50,.7);
  transform:translateY(-4px);
  box-shadow:0 16px 40px rgba(180,110,0,.45);
}

.num{
  font-family:'Cormorant Garamond',serif;
  font-size:12px;font-weight:400;
  letter-spacing:4px;margin-bottom:18px;
}
.cartao-azul .num{color:rgba(150,200,255,.6)}
.cartao-ouro .num{color:rgba(220,165,50,.6)}

.nome{
  font-family:'Cormorant Garamond',serif;
  font-size:32px;font-weight:700;
  color:#fff;line-height:1.15;
  margin-bottom:12px;letter-spacing:-.3px;
}
.desc{font-size:12px;line-height:1.8;max-width:155px}
.cartao-azul .desc{color:rgba(180,215,255,.6)}
.cartao-ouro .desc{color:rgba(220,185,100,.6)}

.tag{
  display:inline-flex;align-items:center;gap:6px;
  margin-top:20px;
  font-size:10px;letter-spacing:2px;text-transform:uppercase;
  font-weight:600;padding:6px 16px;border-radius:20px;
}
.cartao-azul .tag{background:rgba(100,160,255,.15);color:rgba(150,210,255,.9);border:1px solid rgba(100,160,255,.3)}
.cartao-ouro .tag{background:rgba(200,148,50,.15);color:rgba(240,190,80,.9);border:1px solid rgba(200,148,50,.35)}
.tag::before{content:'';width:6px;height:6px;border-radius:50%;animation:pulse 2s infinite}
.cartao-azul .tag::before{background:#5aa0ff}
.cartao-ouro .tag::before{background:#c8943a}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

.rodape{font-size:10px;color:rgba(255,255,255,.15);letter-spacing:1.5px;text-transform:uppercase}
</style>
</head>
